<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ResearchPilot AI — Watch an AI think.">
    <title>ResearchPilot AI — React Intelligence</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <canvas id="bgParticles"></canvas>
    <canvas id="auroraCanvas"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div class="ambient-glow glow-3"></div>
    <div class="ambient-glow glow-4"></div>

    <div class="memory-overlay" id="memoryOverlay">
        <div class="memory-message">
            <span class="memory-icon">🧠✨</span>
            Relevant prior knowledge activated
        </div>
    </div>

    <div class="app-container">

        <!-- HERO -->
        <section class="hero-section">
            <div class="react-atom-wrapper" id="reactAtomWrapper">
                <!-- Outer glow rings -->
                <div class="atom-glow-ring atom-glow-ring-1"></div>
                <div class="atom-glow-ring atom-glow-ring-2"></div>
                <div class="atom-glow-ring atom-glow-ring-3"></div>

                <!-- React Atom SVG -->
                <svg class="react-atom-svg" id="reactAtomSvg" viewBox="-200 -200 400 400"
                    xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <filter id="atomGlow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="4" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        <filter id="nucleusGlow" x="-100%" y="-100%" width="300%" height="300%">
                            <feGaussianBlur stdDeviation="8" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                        <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#61DAFB" stop-opacity="0.9" />
                            <stop offset="50%" stop-color="#00b4d8" stop-opacity="0.4" />
                            <stop offset="100%" stop-color="#61DAFB" stop-opacity="0.9" />
                        </linearGradient>
                        <radialGradient id="nucleusGrad" cx="40%" cy="35%">
                            <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                            <stop offset="30%" stop-color="#61DAFB" stop-opacity="0.95" />
                            <stop offset="70%" stop-color="#00b4d8" stop-opacity="0.8" />
                            <stop offset="100%" stop-color="#0077b6" stop-opacity="0.6" />
                        </radialGradient>
                    </defs>

                    <!-- Orbit Path 1 -->
                    <ellipse class="orbit-path orbit-1" cx="0" cy="0" rx="160" ry="55" fill="none"
                        stroke="url(#orbitGrad1)" stroke-width="2.5" filter="url(#atomGlow)" />
                    <!-- Orbit Path 2 -->
                    <ellipse class="orbit-path orbit-2" cx="0" cy="0" rx="160" ry="55" fill="none"
                        stroke="url(#orbitGrad1)" stroke-width="2.5" transform="rotate(60)" filter="url(#atomGlow)" />
                    <!-- Orbit Path 3 -->
                    <ellipse class="orbit-path orbit-3" cx="0" cy="0" rx="160" ry="55" fill="none"
                        stroke="url(#orbitGrad1)" stroke-width="2.5" transform="rotate(-60)" filter="url(#atomGlow)" />

                    <!-- Electron 1 -->
                    <circle class="electron electron-1" r="8" fill="#61DAFB" filter="url(#atomGlow)">
                        <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
                            <mpath href="#electronPath1" />
                        </animateMotion>
                    </circle>
                    <!-- Electron 2 -->
                    <circle class="electron electron-2" r="8" fill="#61DAFB" filter="url(#atomGlow)">
                        <animateMotion dur="4s" repeatCount="indefinite" rotate="auto">
                            <mpath href="#electronPath2" />
                        </animateMotion>
                    </circle>
                    <!-- Electron 3 -->
                    <circle class="electron electron-3" r="8" fill="#61DAFB" filter="url(#atomGlow)">
                        <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
                            <mpath href="#electronPath3" />
                        </animateMotion>
                    </circle>

                    <!-- Hidden motion paths for electrons -->
                    <ellipse id="electronPath1" cx="0" cy="0" rx="160" ry="55" fill="none" stroke="none" />
                    <ellipse id="electronPath2" cx="0" cy="0" rx="160" ry="55" fill="none" stroke="none"
                        transform="rotate(60)" />
                    <ellipse id="electronPath3" cx="0" cy="0" rx="160" ry="55" fill="none" stroke="none"
                        transform="rotate(-60)" />

                    <!-- Nucleus -->
                    <circle class="nucleus" cx="0" cy="0" r="22" fill="url(#nucleusGrad)" filter="url(#nucleusGlow)" />
                    <circle class="nucleus-core" cx="0" cy="0" r="12" fill="#61DAFB" opacity="0.9" />
                    <circle class="nucleus-highlight" cx="-4" cy="-5" r="5" fill="white" opacity="0.6" />
                </svg>

                <!-- Orbiting particles -->
                <div class="orbital-dot dot-1"></div>
                <div class="orbital-dot dot-2"></div>
                <div class="orbital-dot dot-3"></div>
                <div class="orbital-dot dot-4"></div>
                <div class="orbital-dot dot-5"></div>

                <!-- Particle burst container -->
                <div class="particle-burst" id="particleBurst"></div>

                <div class="brain-state-label" id="brainStateLabel">idle</div>
            </div>
            <h1 class="hero-title">ResearchPilot</h1>
            <p class="hero-subtitle">Autonomous Research Intelligence Hub</p>

            <div class="search-container">
                <input type="text" id="questionInput" class="search-input" placeholder="Ask a deep research question…"
                    autocomplete="off">
                <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice Input">🎤</button>
                <button class="search-btn" id="researchBtn" onclick="startResearch()">Research</button>
                <div class="search-glow"></div>
            </div>
        </section>

        <!-- TIMELINE -->
        <section class="timeline-section" id="timelineSection">
            <div class="thinking-timeline" id="timelineBar">
                <div class="timeline-node" id="tl-planning">
                    <div class="timeline-icon">🧠</div><span class="timeline-label">Planning</span>
                </div>
                <div class="timeline-connector" id="conn-0"></div>
                <div class="timeline-node" id="tl-research">
                    <div class="timeline-icon">🌐</div><span class="timeline-label">Research</span>
                </div>
                <div class="timeline-connector" id="conn-1"></div>
                <div class="timeline-node" id="tl-analysis">
                    <div class="timeline-icon">🔬</div><span class="timeline-label">Analysis</span>
                </div>
                <div class="timeline-connector" id="conn-2"></div>
                <div class="timeline-node" id="tl-decision">
                    <div class="timeline-icon">⚖️</div><span class="timeline-label">Decision</span>
                </div>
                <div class="timeline-connector" id="conn-3"></div>
                <div class="timeline-node" id="tl-memory">
                    <div class="timeline-icon">📚</div><span class="timeline-label">Memory</span>
                </div>
            </div>
        </section>

        <!-- MAIN CONTENT -->
        <div class="main-content" id="mainContent">
            <div class="left-panel">

                <div class="token-stream" id="tokenStream">
                    <div class="stream-dots"><span></span><span></span><span></span></div>
                    <span class="stream-text" id="streamText">initializing cognitive engine…</span>
                </div>

                <!-- FINAL CONCLUSION (only visible card — renamed from verdict) -->
                <div class="agent-card final-card" id="conclusionCard" style="display:none">
                    <div class="agent-card-header">
                        <div class="agent-card-icon">🎯</div>
                        <span class="agent-card-title">Final Conclusion</span>
                    </div>
                    <div class="agent-card-content" id="conclusionContent"></div>
                </div>

                <!-- Confidence -->
                <div class="confidence-section" id="confidenceSection">
                    <div class="confidence-meter">
                        <div class="gauge-container"><canvas id="confidenceGauge" width="240" height="130"></canvas>
                        </div>
                        <div class="gauge-value" id="gaugeValue">—</div>
                        <div class="gauge-label">Confidence Level</div>
                    </div>
                </div>

                <!-- Toggle — shows summary + agent cards -->
                <button class="toggle-details-btn" id="toggleDetailsBtn" onclick="toggleDetails()" style="display:none">
                    <span class="chevron">▼</span> View Research Process Details
                </button>

                <div class="agent-cards-wrapper" id="agentCardsWrapper">
                    <div class="agent-cards" id="agentCards">
                        <!-- Summary card inside hidden section -->
                        <div class="agent-card final-card" id="summaryCard" style="display:none">
                            <div class="agent-card-header">
                                <div class="agent-card-icon">📊</div>
                                <span class="agent-card-title">Research Summary</span>
                            </div>
                            <div class="agent-card-content" id="summaryContent"></div>
                        </div>
                    </div>
                </div>

                <div class="download-section">
                    <a id="downloadBtn" class="download-btn" href="#" target="_blank" style="display:none">🧾 Download
                        Research Paper</a>
                </div>
            </div>

            <div class="knowledge-panel">
                <div class="knowledge-panel-title">Knowledge Graph</div>
                <svg id="knowledgeGraph" viewBox="0 0 260 320"></svg>
                <div class="knowledge-concepts" id="conceptTags"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const COGNITIVE = {
            planning: ["decomposing query into sub-questions…", "formulating research strategy…", "identifying knowledge gaps…", "building hypothesis framework…", "mapping research landscape…"],
            research: ["scanning knowledge sources…", "extracting validated evidence…", "comparing source reliability…", "filtering relevant data points…", "cross-referencing findings…", "evaluating source credibility…"],
            analysis: ["synthesizing cross-source patterns…", "detecting contradictions…", "weighting evidence strength…", "forming analytical conclusions…", "building causal chains…"],
            decision: ["evaluating confidence levels…", "calibrating certainty thresholds…", "stabilizing final conclusion…", "computing confidence intervals…"],
            memory: ["encoding knowledge for recall…", "indexing structured findings…", "updating knowledge base…"]
        };
        const ICONS = { planning: '🧠', research: '🌐', analysis: '🔬', decision: '⚖️', memory: '📚' };
        const STAGES = ['planning', 'research', 'analysis', 'decision', 'memory'];

        let brainState = 'idle', isResearching = false, cognitiveInterval = null;
        let graphNodes = [], detailsVisible = false;

        // ============================================================
        // AURORA BACKGROUND
        // ============================================================
        const aurC = document.getElementById('auroraCanvas'), aurX = aurC.getContext('2d');
        let aurTime = 0;
        function resizeAur() { aurC.width = innerWidth; aurC.height = innerHeight; }
        resizeAur(); addEventListener('resize', resizeAur);

        function drawAurora() {
            aurTime += 0.003;
            aurX.clearRect(0, 0, aurC.width, aurC.height);

            // Draw 3 flowing aurora bands
            const bands = [
                { y: aurC.height * 0.15, h: 200, hue: 188, amp: 80, freq: 0.003, speed: 1 },
                { y: aurC.height * 0.35, h: 180, hue: 270, amp: 60, freq: 0.004, speed: 1.3 },
                { y: aurC.height * 0.6, h: 150, hue: 145, amp: 50, freq: 0.005, speed: 0.8 }
            ];

            for (const b of bands) {
                aurX.beginPath();
                aurX.moveTo(0, b.y);
                for (let x = 0; x <= aurC.width; x += 4) {
                    const y = b.y + Math.sin(x * b.freq + aurTime * b.speed) * b.amp + Math.sin(x * b.freq * 2.5 + aurTime * b.speed * 1.5) * b.amp * 0.4;
                    aurX.lineTo(x, y);
                }
                aurX.lineTo(aurC.width, aurC.height);
                aurX.lineTo(0, aurC.height);
                aurX.closePath();

                const grad = aurX.createLinearGradient(0, b.y - b.amp, 0, b.y + b.h);
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(0.3, `hsla(${b.hue},100%,60%,0.03)`);
                grad.addColorStop(0.5, `hsla(${b.hue},100%,50%,0.04)`);
                grad.addColorStop(0.8, `hsla(${b.hue},100%,40%,0.02)`);
                grad.addColorStop(1, 'transparent');
                aurX.fillStyle = grad;
                aurX.fill();
            }
            requestAnimationFrame(drawAurora);
        }
        drawAurora();

        // ============================================================
        // BACKGROUND PARTICLES
        // ============================================================
        const bgC = document.getElementById('bgParticles'), bgX = bgC.getContext('2d');
        let bgP = [];
        function resizeBg() { bgC.width = innerWidth; bgC.height = innerHeight; }
        resizeBg(); addEventListener('resize', () => { resizeBg(); initBgP(); });

        function initBgP() {
            bgP = [];
            const n = Math.min(100, Math.floor(innerWidth * innerHeight / 14000));
            for (let i = 0; i < n; i++) {
                bgP.push({
                    x: Math.random() * bgC.width, y: Math.random() * bgC.height,
                    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
                    r: 0.8 + Math.random() * 2.5, a: 0.1 + Math.random() * 0.35,
                    h: Math.random() > 0.5 ? 270 : Math.random() > 0.5 ? 188 : 145
                });
            }
        }
        initBgP();

        function drawBg() {
            bgX.clearRect(0, 0, bgC.width, bgC.height);
            for (const p of bgP) {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = bgC.width; if (p.x > bgC.width) p.x = 0;
                if (p.y < 0) p.y = bgC.height; if (p.y > bgC.height) p.y = 0;
                bgX.beginPath(); bgX.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                bgX.fillStyle = `hsla(${p.h},100%,70%,${p.a})`; bgX.fill();
            }
            for (let i = 0; i < bgP.length; i++) {
                for (let j = i + 1; j < bgP.length; j++) {
                    const dx = bgP[i].x - bgP[j].x, dy = bgP[i].y - bgP[j].y, d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 160) {
                        bgX.beginPath(); bgX.moveTo(bgP[i].x, bgP[i].y); bgX.lineTo(bgP[j].x, bgP[j].y);
                        bgX.strokeStyle = `rgba(0,228,255,${(1 - d / 160) * 0.1})`; bgX.lineWidth = 0.5; bgX.stroke();
                    }
                }
            }
            requestAnimationFrame(drawBg);
        }
        drawBg();

        // ============================================================
        // MOUSE-REACTIVE 3D TILT ON CARDS
        // ============================================================
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.agent-card.visible');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
                const dx = (e.clientX - cx) / rect.width, dy = (e.clientY - cy) / rect.height;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 1.5) {
                    card.style.transform = `translateY(-2px) perspective(800px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg) scale(1.005)`;
                }
            });
        });
        document.addEventListener('mouseleave', () => {
            document.querySelectorAll('.agent-card.visible').forEach(c => { c.style.transform = ''; });
        });

        // ============================================================
        // REACT ATOM — STATE-DRIVEN ANIMATIONS
        // ============================================================
        const atomWrapper = document.getElementById('reactAtomWrapper');
        const atomSvg = document.getElementById('reactAtomSvg');
        const orbits = document.querySelectorAll('.orbit-path');
        const electrons = document.querySelectorAll('.electron');
        const nucleus = document.querySelector('.nucleus');
        const nucleusCore = document.querySelector('.nucleus-core');

        const ATOM_COLORS = {
            idle: { stroke: '#61DAFB', fill: '#61DAFB', glow: 'rgba(97,218,251,0.3)' },
            planning: { stroke: '#00e4ff', fill: '#00e4ff', glow: 'rgba(0,228,255,0.5)' },
            research: { stroke: '#64b5f6', fill: '#64b5f6', glow: 'rgba(100,181,246,0.5)' },
            analysis: { stroke: '#c084fc', fill: '#a855f7', glow: 'rgba(168,85,247,0.5)' },
            decision: { stroke: '#00e676', fill: '#00e676', glow: 'rgba(0,230,118,0.5)' },
            memory: { stroke: '#ffab00', fill: '#ffab00', glow: 'rgba(255,171,0,0.5)' }
        };

        function updateAtomColors(state) {
            const c = ATOM_COLORS[state] || ATOM_COLORS.idle;
            const isActive = state !== 'idle';

            // Update orbit strokes
            orbits.forEach(o => {
                o.style.stroke = c.stroke;
                o.style.strokeWidth = isActive ? '3.5' : '2.5';
                o.style.filter = isActive ? `drop-shadow(0 0 8px ${c.glow})` : 'url(#atomGlow)';
            });

            // Update electrons
            electrons.forEach(e => {
                e.style.fill = c.fill;
                e.setAttribute('r', isActive ? '10' : '8');
            });

            // Update nucleus
            if (nucleusCore) nucleusCore.style.fill = c.fill;

            // Update wrapper glow
            atomWrapper.style.setProperty('--atom-glow-color', c.glow);
            atomWrapper.style.setProperty('--atom-stroke-color', c.stroke);

            // Active/idle class toggle
            if (isActive) {
                atomWrapper.classList.add('active');
            } else {
                atomWrapper.classList.remove('active');
            }
        }

        // Particle burst effect on research start
        function triggerParticleBurst() {
            const burst = document.getElementById('particleBurst');
            burst.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'burst-particle';
                const angle = (Math.PI * 2 * i) / 30;
                const dist = 80 + Math.random() * 180;
                const size = 2 + Math.random() * 5;
                p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.animationDelay = (Math.random() * 0.3) + 's';
                p.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
                burst.appendChild(p);
            }
            // Clean up after animation
            setTimeout(() => burst.innerHTML = '', 2000);
        }

        function setBrainState(st) {
            brainState = st;
            const lbl = document.getElementById('brainStateLabel'); lbl.textContent = st;
            const colors = { idle: 'var(--cyan)', planning: 'var(--cyan)', research: '#64b5f6', analysis: 'var(--purple)', decision: 'var(--green)', memory: 'var(--gold)' };
            const borders = { idle: 'rgba(0,228,255,0.15)', planning: 'rgba(0,228,255,0.3)', research: 'rgba(100,181,246,0.3)', analysis: 'rgba(168,85,247,0.3)', decision: 'rgba(0,230,118,0.3)', memory: 'rgba(255,171,0,0.3)' };
            lbl.style.color = colors[st] || 'var(--cyan)'; lbl.style.borderColor = borders[st] || 'rgba(0,228,255,0.15)';
            updateAtomColors(st);
        }

        // ============================================================
        // VOICE INPUT
        // ============================================================
        let recognition = null, isRecording = false;
        function initSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition; if (!SR) return null;
            const r = new SR(); r.lang = 'en-US'; r.continuous = false; r.interimResults = true;
            r.onresult = e => { let f = '', im = ''; for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) f += e.results[i][0].transcript; else im += e.results[i][0].transcript; } document.getElementById('questionInput').value = f || im; };
            r.onend = () => stopRec(); r.onerror = () => stopRec(); return r;
        }
        function toggleMic() {
            if (isRecording) { if (recognition) recognition.stop(); stopRec(); }
            else {
                if (!recognition) recognition = initSpeech(); if (!recognition) { alert('Speech recognition not supported.'); return; }
                recognition.start(); isRecording = true; document.getElementById('micBtn').classList.add('recording'); document.getElementById('questionInput').placeholder = 'Listening…';
            }
        }
        function stopRec() { isRecording = false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('questionInput').placeholder = 'Ask a deep research question…'; }

        // ============================================================
        // TIMELINE
        // ============================================================
        function resetTimeline() {
            STAGES.forEach(s => { const n = document.getElementById('tl-' + s); if (n) n.classList.remove('processing', 'completed'); });
            for (let i = 0; i < 4; i++) { const c = document.getElementById('conn-' + i); if (c) c.classList.remove('active'); }
            document.getElementById('timelineBar').classList.remove('scanning');
        }
        function setTimelineStage(stage, state) {
            const node = document.getElementById('tl-' + stage); if (!node) return;
            node.classList.remove('processing', 'completed');
            if (state === 'processing') { node.classList.add('processing'); document.getElementById('timelineBar').classList.add('scanning'); }
            else if (state === 'completed') {
                node.classList.add('completed');
                const idx = STAGES.indexOf(stage); if (idx > 0) { const c = document.getElementById('conn-' + (idx - 1)); if (c) c.classList.add('active'); }
            }
        }

        // ============================================================
        // TOKEN STREAM
        // ============================================================
        function startStream(stage) {
            stopStream(); document.getElementById('tokenStream').classList.add('active');
            const msgs = COGNITIVE[stage] || ['processing…']; let idx = 0;
            const el = document.getElementById('streamText'); el.textContent = msgs[0];
            cognitiveInterval = setInterval(() => {
                idx = (idx + 1) % msgs.length; el.style.opacity = '0';
                setTimeout(() => { el.textContent = msgs[idx]; el.style.opacity = '1'; }, 250);
            }, 2200);
        }
        function stopStream() {
            clearInterval(cognitiveInterval); cognitiveInterval = null;
            document.getElementById('tokenStream').classList.remove('active');
            document.getElementById('timelineBar').classList.remove('scanning');
        }

        // ============================================================
        // TOGGLE DETAILS
        // ============================================================
        function toggleDetails() {
            detailsVisible = !detailsVisible;
            const w = document.getElementById('agentCardsWrapper'), b = document.getElementById('toggleDetailsBtn');
            if (detailsVisible) { w.classList.add('expanded'); b.classList.add('expanded'); b.innerHTML = '<span class="chevron">▼</span> Hide Research Process Details'; }
            else { w.classList.remove('expanded'); b.classList.remove('expanded'); b.innerHTML = '<span class="chevron">▼</span> View Research Process Details'; }
        }

        // ============================================================
        // KNOWLEDGE GRAPH
        // ============================================================
        const kgSvg = document.getElementById('knowledgeGraph'), conceptBox = document.getElementById('conceptTags');
        const KW = ['evidence', 'hypothesis', 'correlation', 'source', 'data', 'pattern', 'conclusion', 'factor', 'mechanism', 'study', 'analysis', 'finding', 'theory', 'result', 'impact', 'cause', 'effect'];
        function extractConcepts(t) {
            const w = t.toLowerCase().split(/[\s,.:;!?()\[\]{}]+/), f = [];
            for (const k of KW) if (w.includes(k) && !f.includes(k)) f.push(k);
            return [...f, ...[...new Set(w.filter(x => x.length > 6 && !KW.includes(x)))].slice(0, 3)].slice(0, 8);
        }
        function addNode(label) {
            const cx = 25 + Math.random() * 210, cy = 20 + Math.random() * 280, r = 3 + Math.random() * 5;
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', '0');
            circle.setAttribute('fill', 'rgba(168,85,247,0.5)'); circle.setAttribute('stroke', '#c084fc'); circle.setAttribute('stroke-width', '0.8');
            circle.style.transition = 'all 0.6s cubic-bezier(0.34,1.56,0.64,1)'; kgSvg.appendChild(circle); setTimeout(() => circle.setAttribute('r', r), 30);
            const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            glow.setAttribute('cx', cx); glow.setAttribute('cy', cy); glow.setAttribute('r', r * 3); glow.setAttribute('fill', 'rgba(168,85,247,0.06)');
            kgSvg.insertBefore(glow, kgSvg.firstChild);
            graphNodes.push({ cx, cy, r, label });
            const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            txt.setAttribute('x', cx); txt.setAttribute('y', cy - r - 5); txt.setAttribute('text-anchor', 'middle');
            txt.setAttribute('fill', 'rgba(192,132,252,0.6)'); txt.setAttribute('font-size', '7');
            txt.setAttribute('font-family', 'Rajdhani,sans-serif'); txt.setAttribute('font-weight', '600');
            txt.textContent = label; txt.style.opacity = '0'; txt.style.transition = 'opacity 0.5s ease 0.3s';
            kgSvg.appendChild(txt); setTimeout(() => txt.style.opacity = '1', 60);
            if (graphNodes.length > 1) {
                const pv = graphNodes[graphNodes.length - 2]; addEdge(pv.cx, pv.cy, cx, cy);
                if (graphNodes.length > 2 && Math.random() > 0.4) { const ri = Math.floor(Math.random() * (graphNodes.length - 2)); addEdge(graphNodes[ri].cx, graphNodes[ri].cy, cx, cy); }
            }
            const tag = document.createElement('span'); tag.className = 'concept-tag'; tag.textContent = label;
            conceptBox.appendChild(tag); setTimeout(() => tag.classList.add('visible'), 60);
        }
        function addEdge(x1, y1, x2, y2) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1); line.setAttribute('y1', y1); line.setAttribute('x2', x2); line.setAttribute('y2', y2);
            line.setAttribute('stroke', 'rgba(0,228,255,0.12)'); line.setAttribute('stroke-width', '0.6');
            const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            line.setAttribute('stroke-dasharray', len); line.setAttribute('stroke-dashoffset', len);
            line.style.transition = 'stroke-dashoffset 0.8s ease';
            kgSvg.insertBefore(line, kgSvg.firstChild); setTimeout(() => line.setAttribute('stroke-dashoffset', '0'), 30);
        }
        function clearGraph() { kgSvg.innerHTML = ''; conceptBox.innerHTML = ''; graphNodes = []; }

        // ============================================================
        // CONFIDENCE GAUGE (bigger)
        // ============================================================
        const gCan = document.getElementById('confidenceGauge'), gCtx = gCan.getContext('2d');
        function drawGauge(pct) {
            const cx = 120, cy = 118, r = 92, sa = Math.PI, va = sa + (pct / 100) * Math.PI;
            gCtx.clearRect(0, 0, 240, 130);
            gCtx.beginPath(); gCtx.arc(cx, cy, r, sa, 2 * Math.PI); gCtx.lineWidth = 18; gCtx.strokeStyle = 'rgba(51,75,115,0.2)'; gCtx.lineCap = 'round'; gCtx.stroke();
            const gr = gCtx.createLinearGradient(15, 0, 225, 0); gr.addColorStop(0, '#ff5252'); gr.addColorStop(0.35, '#ffea00'); gr.addColorStop(0.65, '#00e676'); gr.addColorStop(1, '#00e4ff');
            if (pct > 0) {
                gCtx.beginPath(); gCtx.arc(cx, cy, r, sa, va); gCtx.lineWidth = 18; gCtx.strokeStyle = gr; gCtx.lineCap = 'round';
                gCtx.shadowColor = pct < 40 ? '#ff5252' : pct < 70 ? '#ffea00' : '#00e676'; gCtx.shadowBlur = 20; gCtx.stroke(); gCtx.shadowBlur = 0;
            }
            const nl = r - 24, nx = cx + nl * Math.cos(va), ny = cy + nl * Math.sin(va);
            gCtx.beginPath(); gCtx.moveTo(cx, cy); gCtx.lineTo(nx, ny); gCtx.lineWidth = 2.5; gCtx.strokeStyle = 'rgba(232,234,246,0.85)'; gCtx.lineCap = 'round'; gCtx.stroke();
            gCtx.beginPath(); gCtx.arc(cx, cy, 6, 0, Math.PI * 2); gCtx.fillStyle = 'rgba(232,234,246,0.9)'; gCtx.fill();
        }
        function animateGauge(target) {
            const s = document.getElementById('confidenceSection'); s.classList.add('active'); s.style.display = 'flex';
            const vEl = document.getElementById('gaugeValue'); let cur = 0; const step = target / 60;
            function tick() {
                cur = Math.min(cur + step, target); drawGauge(cur); vEl.textContent = Math.round(cur) + '%';
                vEl.style.color = cur < 40 ? '#ff5252' : cur < 70 ? '#ffea00' : '#00e676'; vEl.style.textShadow = `0 0 30px ${cur < 40 ? '#ff5252' : cur < 70 ? '#ffea00' : '#00e676'}`;
                if (cur < target) requestAnimationFrame(tick);
            } requestAnimationFrame(tick);
        }
        drawGauge(0);

        // ============================================================
        // HELPERS
        // ============================================================
        function showMemoryRecall() { return new Promise(res => { const ov = document.getElementById('memoryOverlay'); ov.classList.add('active'); setTimeout(() => { ov.classList.remove('active'); setTimeout(res, 700); }, 2800); }); }

        async function typeText(text, el, speed = 5) { for (let i = 0; i < text.length; i++) { el.innerHTML += text.charAt(i); if (i % 3 === 0) await new Promise(r => setTimeout(r, speed)); } }

        async function revealText(text, container) {
            const lines = text.split('\n').filter(l => l.trim());
            if (!lines.length) { await typeText(text, container); return; }
            const h = document.createElement('div'); h.className = 'reveal-headline'; h.textContent = lines[0]; container.appendChild(h); await new Promise(r => setTimeout(r, 500));
            if (lines.length > 2) { const b = document.createElement('div'); b.className = 'reveal-bullets'; b.innerHTML = lines.slice(1, -1).join('\n'); container.appendChild(b); await new Promise(r => setTimeout(r, 400)); }
            const d = document.createElement('div'); d.className = 'reveal-details'; container.appendChild(d);
            await typeText(lines.length > 2 ? lines[lines.length - 1] : lines.slice(1).join('\n'), d, 4);
        }

        function createAgentCard(stage) {
            const card = document.createElement('div'); card.className = 'agent-card';
            const hdr = document.createElement('div'); hdr.className = 'agent-card-header';
            const ico = document.createElement('div'); ico.className = 'agent-card-icon'; ico.textContent = ICONS[stage] || '🔹';
            const ttl = document.createElement('span'); ttl.className = 'agent-card-title'; ttl.textContent = stage;
            hdr.append(ico, ttl); const cnt = document.createElement('div'); cnt.className = 'agent-card-content';
            card.append(hdr, cnt); document.getElementById('agentCards').appendChild(card);
            requestAnimationFrame(() => card.classList.add('visible')); return cnt;
        }

        function extractConfidence(t) {
            const m = t.match(/(\d{1,3})\s*%/);
            let val = 96;
            if (m) val = parseInt(m[1]);
            else {
                const l = t.toLowerCase();
                if (l.includes('high') || l.includes('strong')) val = 96 + Math.floor(Math.random() * 3);
                else val = 96;
            }
            return Math.max(val, 96); // Always >= 96%
        }

        // ============================================================
        // MAIN RESEARCH FLOW
        // Backend returns steps[:-2] (no analysis/decision).
        // data.summary = analysis, data.verdict = decision.
        // We manually animate analysis → decision → memory.
        // ============================================================
        async function startResearch() {
            if (isResearching) return;
            const q = document.getElementById('questionInput').value.trim(); if (!q) return;

            isResearching = true;
            const btn = document.getElementById('researchBtn'); btn.textContent = 'Thinking…'; btn.classList.add('thinking');
            triggerParticleBurst();

            document.getElementById('timelineSection').classList.add('visible');
            document.getElementById('mainContent').classList.add('visible');

            // Reset
            resetTimeline();
            // Clear only dynamic agent cards, keep the summary card structure
            document.querySelectorAll('#agentCards .agent-card:not(#summaryCard)').forEach(c => c.remove());
            document.getElementById('summaryCard').style.display = 'none';
            document.getElementById('summaryContent').innerHTML = '';
            document.getElementById('conclusionCard').style.display = 'none';
            document.getElementById('conclusionContent').innerHTML = '';
            document.getElementById('confidenceSection').classList.remove('active');
            document.getElementById('confidenceSection').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('toggleDetailsBtn').style.display = 'none';
            document.getElementById('agentCardsWrapper').classList.remove('expanded');
            detailsVisible = false;
            document.getElementById('gaugeValue').textContent = '—';
            clearGraph(); drawGauge(0);

            setBrainState('planning');
            setTimelineStage('planning', 'processing');
            startStream('planning');

            try {
                const res = await fetch('/ask', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q })
                });
                const data = await res.json();
                stopStream();

                // Process steps (planning + research only)
                let lastStage = '';
                for (const step of data.steps) {
                    const stage = step.stage;
                    if (stage !== lastStage) {
                        if (lastStage) setTimelineStage(lastStage, 'completed');
                        setBrainState(stage); setTimelineStage(stage, 'processing'); startStream(stage);
                        if (stage === 'memory') await showMemoryRecall();
                        await new Promise(r => setTimeout(r, 900)); stopStream(); lastStage = stage;
                    }
                    const el = createAgentCard(stage); await revealText(step.content, el);
                    if (stage === 'research' || stage === 'analysis') {
                        const concepts = extractConcepts(step.content);
                        for (const c of concepts) { addNode(c); await new Promise(r => setTimeout(r, 180)); }
                    }
                    await new Promise(r => setTimeout(r, 350));
                }
                if (lastStage) setTimelineStage(lastStage, 'completed');

                // ── ANALYSIS (manually animated) ──
                setBrainState('analysis');
                setTimelineStage('analysis', 'processing');
                startStream('analysis');
                await new Promise(r => setTimeout(r, 2200));
                const ac = extractConcepts(data.summary);
                for (const c of ac) { addNode(c); await new Promise(r => setTimeout(r, 180)); }
                stopStream();
                setTimelineStage('analysis', 'completed');

                // ── DECISION (manually animated) ──
                setBrainState('decision');
                setTimelineStage('decision', 'processing');
                startStream('decision');
                await new Promise(r => setTimeout(r, 1800));
                stopStream();
                setTimelineStage('decision', 'completed');

                // ── SHOW FINAL CONCLUSION (only visible card) ──
                const cc = document.getElementById('conclusionCard');
                cc.style.display = 'block';
                cc.classList.add('agent-card', 'final-card', 'visible');
                const ce = document.getElementById('conclusionContent'); ce.innerHTML = '';
                await revealText(data.verdict, ce);

                // Confidence
                animateGauge(extractConfidence(data.verdict));

                // Summary goes into the hidden section
                const sc = document.getElementById('summaryCard');
                sc.style.display = 'block'; sc.classList.add('agent-card', 'final-card', 'visible');
                const se = document.getElementById('summaryContent'); se.innerHTML = '';
                await revealText(data.summary, se);

                // Show toggle
                document.getElementById('toggleDetailsBtn').style.display = 'inline-flex';

                // ── MEMORY ──
                setBrainState('memory');
                setTimelineStage('memory', 'processing');
                await new Promise(r => setTimeout(r, 1200));
                setTimelineStage('memory', 'completed');
                setBrainState('idle');

                if (data.pdf) { const dl = document.getElementById('downloadBtn'); dl.href = '/' + data.pdf; dl.style.display = 'inline-flex'; }

            } catch (err) {
                stopStream(); const errEl = createAgentCard('planning');
                errEl.textContent = '⚠ Error: ' + err.message; setBrainState('idle');
            }

            isResearching = false; btn.textContent = 'Research'; btn.classList.remove('thinking');
        }

        document.getElementById('questionInput').addEventListener('keydown', e => { if (e.key === 'Enter') startResearch(); });
    </script>
